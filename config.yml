# =============================================================================
# Site Monitor — Organisation-Wide Configuration
# =============================================================================
# Sites and teams can be managed via the dashboard UI.
# Manual edits here are also supported.
# =============================================================================

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------
global:
  check_interval_minutes: 5
  vitals_interval_minutes: 30
  timeout_ms: 20000
  repeat_alert_every: 3
  default_sla_target: 99.9
  weekly_digest_day: monday
  weekly_digest_hour: 9
  monthly_report_day: 1

# ---------------------------------------------------------------------------
# Teams — auto-created when adding sites via dashboard
# ---------------------------------------------------------------------------
teams: {}

# ---------------------------------------------------------------------------
# Sites — add via dashboard or manually here
# ---------------------------------------------------------------------------
sites:
  - name: Equinavia
    url: https://equinavia.com
    region: us
    team: default
    sla_target: 99.9
    check_endpoints:
      - path: /
        method: GET
        expected_status: 200
    auth: null
    tags:
      - production
      - client
    vitals_enabled: true

  - name: Preikestolen
    url: https://preikestolenbasecamp.com
    region: "no"
    team: default
    sla_target: 99.5
    check_endpoints:
      - path: /
        method: GET
        expected_status: 200
    auth: null
    tags:
      - production
      - client
    vitals_enabled: true

# ---------------------------------------------------------------------------
# Multi-region monitoring
# ---------------------------------------------------------------------------
regions:
  us-east:
    name: US East
    proxy: null
    check_ip_url: https://api.ipify.org?format=json
  eu-west:
    name: EU West
    proxy_env: EU_PROXY_URL
    check_ip_url: https://api.ipify.org?format=json
  ap-south:
    name: Asia Pacific
    proxy_env: AP_PROXY_URL
    check_ip_url: https://api.ipify.org?format=json

# ---------------------------------------------------------------------------
# IP Block Detection
# ---------------------------------------------------------------------------
ip_block_detection:
  enabled: true
  block_threshold_percent: 50

# ---------------------------------------------------------------------------
# Thresholds for Core Web Vitals
# ---------------------------------------------------------------------------
thresholds:
  LCP: 2500
  FCP: 1800
  CLS: 0.1
  TBT: 300
