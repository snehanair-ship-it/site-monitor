# ---------------------------------------------------------------------------
# Multi-region monitoring
# ---------------------------------------------------------------------------
regions:
  us-east:
    name: "US East"
    proxy: null                   # direct check from GitHub Actions runner
    check_ip_url: "https://api.ipify.org?format=json"

  eu-west:
    name: "EU West"
    proxy_env: "EU_PROXY_URL"     # optional HTTP proxy for EU checks
    check_ip_url: "https://api.ipify.org?format=json"

  ap-south:
    name: "Asia Pacific"
    proxy_env: "AP_PROXY_URL"     # optional HTTP proxy for AP checks
    check_ip_url: "https://api.ipify.org?format=json"

# ---------------------------------------------------------------------------
# IP Block Detection
# ---------------------------------------------------------------------------
ip_block_detection:
  enabled: true
  # External services used to check site accessibility from multiple locations
  check_services:
    - name: "check-host-ping"
      type: "check-host"
      nodes:
        - "us1"
        - "de1"
        - "sg1"
        - "br1"
        - "in1"
        - "jp1"
  # If a site is reachable from < threshold % of regions, flag as IP-blocked
  block_threshold_percent: 50

# ---------------------------------------------------------------------------
# Thresholds for Core Web Vitals
# ---------------------------------------------------------------------------
thresholds:
  LCP: 2500     # Largest Contentful Paint (ms)
  FCP: 1800     # First Contentful Paint (ms)
  CLS: 0.1      # Cumulative Layout Shift
  TBT: 300      # Total Blocking Time (ms)
