# ---------------------------------------------------------------------------
# Sites — define monitored sites with ownership, auth, and SLA targets
# ---------------------------------------------------------------------------
sites:
  - name: "Equinavia"
    url: "https://equinavia.com"
    region: "us"
    team: "platform"             # owning team (alerts go here)
    sla_target: 99.9             # monthly uptime SLA %
    check_endpoints:             # additional endpoints to check
      - path: "/"
        method: GET
        expected_status: 200
    auth: null                   # no auth needed (see examples below)
    tags: ["production", "client"]
    vitals_enabled: true

  - name: "Preikestolen"
    url: "https://preikestolenbasecamp.com"
    region: "no"
    team: "frontend"
    sla_target: 99.5
    check_endpoints:
      - path: "/"
        method: GET
        expected_status: 200
    auth: null
    tags: ["production", "client"]
    vitals_enabled: true

