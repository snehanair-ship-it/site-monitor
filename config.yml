# =============================================================================
# Site Monitor — Organisation-Wide Configuration
# =============================================================================
# Edit this file to add/remove sites, teams, and policies.
# Changes take effect on the next monitor cycle (every 5 minutes).
# =============================================================================

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------
global:
  check_interval_minutes: 5
  vitals_interval_minutes: 30
  timeout_ms: 20000
  repeat_alert_every: 3          # re-alert every N consecutive failures
  default_sla_target: 99.9       # default SLA % if not set per-site
  weekly_digest_day: monday      # day to send weekly digest (monday-sunday)
  weekly_digest_hour: 9          # hour (24h format) to send weekly digest
  monthly_report_day: 1          # day of month to send SLA report

