global:
  check_interval_minutes: 5
  vitals_interval_minutes: 30
  timeout_ms: 20000
  repeat_alert_every: 3
  default_sla_target: 99.9
  weekly_digest_day: monday
  weekly_digest_hour: 9
  monthly_report_day: 1
teams:
  internal:
    name: Internal
    members: []
    slack_webhook: ''
    escalation:
      level_1_after_minutes: 0
      level_2_after_minutes: 10
      level_3_after_minutes: 30
sites:
  - name: kodework
    url: https://kodework.com
    region: global
    team: internal
    sla_target: 99.9
    check_endpoints:
      - path: /
        method: GET
        expected_status: 200
    auth: null
    tags: []
    vitals_enabled: true
