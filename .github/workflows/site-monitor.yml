name: Site Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    concurrency:
      group: site-monitor
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore uptime data
        run: |
          git fetch origin data || true
          if git show origin/data:data/uptime-data.json > /dev/null 2>&1; then
            mkdir -p data
            git show origin/data:data/uptime-data.json > data/uptime-data.json
            echo "Restored data"
          else
            echo "Starting fresh"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run monitor
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          TIMEOUT_MS: 20000
        run: node web-monitor.js --once

      - name: Persist data
        run: |
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          if git ls-remote --exit-code "$REPO_URL" data > /dev/null 2>&1; then
            git clone --single-branch --branch data --depth 1 "$REPO_URL" /tmp/data-repo
          else
            git init /tmp/data-repo
            cd /tmp/data-repo
            git remote add origin "$REPO_URL"
            git checkout --orphan data
          fi

          cd /tmp/data-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p data
          cp $GITHUB_WORKSPACE/data/uptime-data.json data/uptime-data.json
          git add data/uptime-data.json
          git diff --cached --quiet || git commit -m "Update uptime data [skip ci]"
          git push origin data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
