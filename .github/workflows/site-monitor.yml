name: Site Monitor

on:
  schedule:
    # Main monitor: every 5 minutes
    - cron: "*/5 * * * *"
    # Weekly digest: Monday 9:00 UTC
    - cron: "0 9 * * 1"
    # Monthly SLA report: 1st of month 9:00 UTC
    - cron: "0 9 1 * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "check"
        type: choice
        options:
          - check
          - report
          - digest

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    concurrency:
      group: site-monitor
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore uptime data from data branch
        run: |
          git fetch origin data || true
          if git show origin/data:data/uptime-data.json > /dev/null 2>&1; then
            mkdir -p data
            git show origin/data:data/uptime-data.json > data/uptime-data.json
            echo "Restored uptime data from data branch"
          else
            echo "No existing uptime data found, starting fresh"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run site monitor
        env:
          SITES: ${{ secrets.SITES }}
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
          PSI_STRATEGY: mobile
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          EU_PROXY_URL: ${{ secrets.EU_PROXY_URL }}
          AP_PROXY_URL: ${{ secrets.AP_PROXY_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INTERVAL_MINUTES: 5
          VITALS_MINUTES: 30
          TIMEOUT_MS: 20000
        run: |
          MODE="${{ github.event.inputs.mode || 'check' }}"
          if [ "$MODE" = "report" ]; then
            node web-monitor.js --once
            node web-monitor.js --report
          elif [ "$MODE" = "digest" ]; then
            node web-monitor.js --once
            node web-monitor.js --digest
          else
            node web-monitor.js --once
          fi

      - name: Backup generated files
        run: |
          cp data/uptime-data.json /tmp/uptime-data.json
          cp -r status-page /tmp/status-page

      - name: Persist uptime data to data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Use a separate clone to push data to avoid branch conflicts
          git clone --depth 1 https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git /tmp/data-repo || true
          cd /tmp/data-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code origin data > /dev/null 2>&1; then
            git fetch origin data
            git checkout data
          else
            git checkout --orphan data
            git rm -rf . 2>/dev/null || true
          fi

          mkdir -p data
          cp /tmp/uptime-data.json data/uptime-data.json
          git add data/uptime-data.json
          git diff --cached --quiet || git commit -m "Update uptime data [skip ci]"
          git push origin data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout main for pages deploy
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Restore status page
        run: |
          mkdir -p status-page
          cp -r /tmp/status-page/* status-page/

      - name: Upload status page artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: status-page

  deploy-pages:
    needs: monitor
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Weekly digest - runs every Monday at 9:00 UTC
  weekly-digest:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9 * * 1' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'digest')
    needs: monitor
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore uptime data
        run: |
          git fetch origin data || true
          if git show origin/data:data/uptime-data.json > /dev/null 2>&1; then
            mkdir -p data
            git show origin/data:data/uptime-data.json > data/uptime-data.json
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Send weekly digest
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
        run: node web-monitor.js --digest

  # Monthly SLA report - runs on the 1st of every month at 9:00 UTC
  monthly-report:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9 1 * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'report')
    needs: monitor
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore uptime data
        run: |
          git fetch origin data || true
          if git show origin/data:data/uptime-data.json > /dev/null 2>&1; then
            mkdir -p data
            git show origin/data:data/uptime-data.json > data/uptime-data.json
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Send monthly SLA report
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
        run: node web-monitor.js --report
